name: Daily Crawl - อัปเดตราคาค่าจัดส่ง

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm install
      - run: node crawler.js
      - run: |
          git config user.name "crawler-bot"
          git config user.email "crawler-bot@users.noreply.github.com"
          git add data/courier_pricing.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 อัปเดตราคาประจำวัน $(date '+%Y-%m-%d')"
          git push
